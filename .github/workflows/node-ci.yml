name: Node CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - aurum/backend
          - aurum/frontend
          - meridian/backend
          - meridian/frontend
          - meridian/workers
          - vektor/backend
          - vektor/frontend

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            **/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        working-directory: ${{ matrix.service }}
        run: npm run lint --if-present

      - name: Type check
        working-directory: ${{ matrix.service }}
        run: npm run typecheck --if-present

      - name: Test
        working-directory: ${{ matrix.service }}
        run: npm run test --if-present -- --passWithNoTests

      - name: Build
        working-directory: ${{ matrix.service }}
        run: npm run build --if-present
